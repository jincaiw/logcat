version: '3.8'

services:
  logcat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logcat
    ports:
      - "8080:8080"
      - "5140:5140/udp"
      - "5140:5140"
    environment:
      - LOGCAT_DATABASE_TYPE=${LOGCAT_DATABASE_TYPE:-mysql}
      - LOGCAT_MYSQL_HOST=mysql
      - LOGCAT_MYSQL_PORT=3306
      - LOGCAT_MYSQL_DATABASE=logcat
      - LOGCAT_MYSQL_USERNAME=logcat
      - LOGCAT_MYSQL_PASSWORD=logcat_password
      - LOGCAT_MYSQL_CHARSET=utf8mb4
      - LOGCAT_MYSQL_TIMEZONE=Asia/Shanghai
      - LOGCAT_ADMIN_PASSWORD=${LOGCAT_ADMIN_PASSWORD:-admin123}
      - LOGCAT_SERVER_PORT=8080
    volumes:
      - logcat-data:/app/data
      - ./configs/config.yaml:/app/configs/config.yaml
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

  mysql:
    image: mysql:8.0
    container_name: logcat-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=logcat
      - MYSQL_USER=logcat
      - MYSQL_PASSWORD=logcat_password
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  logcat-data:
  mysql-data: